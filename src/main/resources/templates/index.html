<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Driving School Portal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .actions-list {
            list-style: none;
            padding: 0;
            text-align: center;
        }
        .actions-list li {
            margin-bottom: 20px;
        }
        .actions-list a, .logout-btn {
            display: inline-block;
            padding: 15px 30px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 1.1em;
            transition: background-color 0.3s;
            border: none;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
        }
        .actions-list a:hover {
            background-color: #0056b3;
        }
        .logout-section {
            margin-top: 30px;
            border-top: 1px solid #eee;
            padding-top: 20px;
            text-align: center;
        }
        .logout-btn {
            background-color: #dc3545;
        }
        .logout-btn:hover {
            background-color: #a71d2a;
        }
        .search-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Vishwa Kannada Driving School</h1>
    <p style="text-align: center;">Welcome, <strong>Admin</strong>!</p>

    <ul class="actions-list">
        <li>
            <a th:href="@{/register}">✍️ Student Registration</a>
        </li>
        <li>
            <a th:href="@{/export/excel}">📊 Download All (Excel)</a>
        </li>
    </ul>

    <div class="search-section">
        <h2>Search Student by ID</h2>
        <form id="searchForm" onsubmit="searchStudent(event)">
            <input type="tel"
                   id="studentPhone"
                   placeholder="Enter 10-digit Phone Number"
                   pattern="[0-9]{10}"
                   title="Please enter a 10-digit phone number"
                   required
                   style="width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box;">
            <button type="submit" class="logout-btn" style="background-color: #28a745;">🔍 Search</button>
        </form>
    </div>

    <div class="logout-section">
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="logout-btn">🚪 Secure Logout</button>
        </form>
    </div>
</div>

<script>
    function searchStudent(event) {
        event.preventDefault();
        const phone = document.getElementById('studentPhone').value;
        if (phone) {
            window.location.href = '/student/' + phone;
        }
    }
</script>
</body>
</html>
