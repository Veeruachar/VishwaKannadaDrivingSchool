<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Driving School Registration</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h1>Vishwa kannada driving school</h1>
    <h2>Registration form</h2>

    <div th:if="${errorMessage}" style="color: red; border: 1px solid red; padding: 10px; margin-bottom: 15px; border-radius: 5px;">
        <p th:text="${errorMessage}"></p>
    </div>

    <form th:action="@{/register}" th:object="${registration}" method="post" enctype="multipart/form-data">

        <label for="firstName">First Name:</label>
        <input type="text" id="firstName" th:field="*{firstName}" required>

        <label for="address">Address:</label>
        <input type="text" id="address" th:field="*{address}" required>

        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone" th:field="*{phone}" required>

        <label for="courseType">Select Course:</label>
        <select id="courseType" th:field="*{courseType}" required>
            <option value="">-- Choose a Course --</option>
            <option value="Regular">30 Days</option>
            <option value="Other">Other</option>
        </select>

        <label for="dlnumber">DL number:</label>
        <input type="text" id="dlnumber" th:field="*{dlnumber}" required>

        <label for="totalFees">Total Course Fees (₹):</label>
        <input type="number" id="totalFees" th:field="*{totalFees}" step="0.01" min="0" placeholder="0.00" required>

        <label for="initialPayment">Initial Payment Amount (₹):</label>
        <input type="number" id="initialPayment" name="initialPayment" step="0.01" min="0" placeholder="0.00">

        <label for="paymentMode">Payment Mode:</label>
        <select id="paymentMode" name="paymentMode">
            <option value="Cash">Cash</option>
            <option value="UPI">UPI / GPay / PhonePe</option>
            <option value="Card">Debit/Credit Card</option>
            <option value="Transfer">Bank Transfer</option>
        </select>

        <label for="admissionDate">Admission Date:</label>
        <input type="date" id="admissionDate" th:field="*{admissionDate}" required>

        <label for="imageFile">Profile Picture:</label>
        <input type="file" id="imageFile" name="imageFile" accept="image/*">

        <button type="submit">Submit Registration</button>
    </form>
    <div style="margin-top: 20px;">
        <a th:href="@{/}">Back to Dashboard</a>
    </div>
</div>
</body>
</html>
